; Mantis dev overrides
upload_max_filesize = 32M
post_max_size = 32M
memory_limit = 256M
max_execution_time = 120
date.timezone = UTC

; Make errors visible during development
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; OPcache: keep enabled but revalidate often so edits show up quickly
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
